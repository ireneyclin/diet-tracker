* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {

  overscroll-behavior-y: contain;
}

#app {

  padding-bottom: calc(80px + env(safe-area-inset-bottom));
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

.header {
  padding: calc(env(safe-area-inset-top) + 16px) 20px 16px;
  background: linear-gradient(180deg, #F5EFE6 70%, rgba(245,239,230,0.85) 100%);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(8px);
}

.header h1 {

  font-weight: 700;
  font-size: 22px;
  margin: 0;
  letter-spacing: 0.5px;
}

.header .date { font-size: 13px; color: #6B7A6B; margin-top: 4px; }

.content { padding: 0 20px; }

.ring-card {
  background: #FFFCF7;
  border-radius: 20px;

  margin-bottom: 12px;
  border: 1px solid rgba(74, 103, 65, 0.08);
  box-shadow: 0 1px 3px rgba(74, 103, 65, 0.04);
}

.ring-row { display: flex; align-items: center; gap: 14px; }
.ring-info { flex: 1; min-width: 0; }

.ring-label {

}

.ring-name { font-weight: 500; font-size: 15px; }

.ring-value { font-family: 'Noto Serif TC', serif; font-size: 14px; color: #6B7A6B; }
.ring-value strong { color: #2D3D2A; font-size: 17px; margin-right: 2px; }

.progress-bar {
  height: 8px; background: #EDE4D3; border-radius: 4px;
  overflow: hidden; position: relative;
}

.progress-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.progress-marker {
  position: absolute; top: -2px; width: 2px; height: 12px;
  background: rgba(45, 61, 42, 0.3); border-radius: 1px;
}

.quick-btns { display: flex; gap: 8px; margin-top: 10px; }

.qbtn {
  flex: 1; border: 1px solid rgba(74, 103, 65, 0.15);
  background: #FFFCF7; color: #4A6741;
  padding: 8px; border-radius: 10px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: all 0.15s; font-family: inherit;
}
.qbtn:active { background: #4A6741; color: #FFFCF7; transform: scale(0.97); }

.num-input {
  width: 100%; text-align: center;
  border: 1px solid rgba(74, 103, 65, 0.2);
  background: #FFFCF7; padding: 8px;
  border-radius: 10px; font-size: 15px;
  font-family: inherit; color: #2D3D2A;
}
.num-input:focus { outline: none; border-color: #4A6741; }

.status-pill {
  display: inline-block; font-size: 11px;
  padding: 2px 8px; border-radius: 8px;
  margin-left: 6px; font-weight: 500;
}
.status-under { background: #F5E5D5; color: #B07A3F; }
.status-ok { background: #DFE8D6; color: #4A6741; }
.status-over { background: #F5D5D5; color: #B04F4F; }

.bottom-nav {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%); width: 100%; max-width: 480px;
  background: #FFFCF7;
  border-top: 1px solid rgba(74, 103, 65, 0.1);

.nav-item {

  color: #8A998A; font-size: 11px; cursor: pointer;
  font-family: inherit; transition: color 0.15s;
}
.nav-item.active { color: #4A6741; }
.nav-icon { font-size: 20px; line-height: 1; }

.section-title {

.action-card {

  cursor: pointer; transition: all 0.15s;
}
.action-card:active { transform: scale(0.98); background: #F5EFE6; }
.action-card.selected { border: 2px solid #4A6741; background: #EDE4D3; }

.primary-btn {
  background: #4A6741; color: #FFFCF7; border: none;
  padding: 12px 20px; border-radius: 12px;
  font-size: 15px; font-weight: 500; cursor: pointer;
  font-family: inherit; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.primary-btn:active { background: #3A5233; }
.primary-btn:disabled { background: #B5B5B5; }

.secondary-btn {
  background: #FFFCF7; color: #4A6741;
  border: 1px solid #4A6741; padding: 10px 16px;
  border-radius: 10px; font-size: 14px;
  font-family: inherit; cursor: pointer;
}

.modal-overlay {
  position: fixed; inset: 0;

  display: flex; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px);
}

.modal {
  background: #F5EFE6; width: 100%; max-width: 480px;
  max-height: 90vh; border-radius: 24px 24px 0 0;
  overflow-y: auto; padding: 24px 20px 32px;

}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-header {

.modal-title {

.icon-btn {

.icon-btn:active { background: rgba(74, 103, 65, 0.1); }

.form-group { margin-bottom: 16px; }

.form-label {

.form-input {

}
.form-input:focus { outline: none; border-color: #4A6741; }

.chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

.chip {
  background: #FFFCF7;
  border: 1px solid rgba(74, 103, 65, 0.15);
  padding: 6px 12px; border-radius: 16px;
  font-size: 13px; color: #4A6741;
  cursor: pointer; font-family: inherit;
}
.chip.selected { background: #4A6741; color: #FFFCF7; border-color: #4A6741; }

.goal-name { font-weight: 500; font-size: 15px; display: flex; align-items: center; gap: 8px; }

.toggle {

  position: relative; cursor: pointer;
  transition: background 0.2s; flex-shrink: 0;
}
.toggle.on { background: #4A6741; }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 18px; height: 18px; background: #FFFCF7;
  border-radius: 50%; transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(18px); }

.range-row .form-input { flex: 1; padding: 8px; text-align: center; }
.range-row span { color: #6B7A6B; font-size: 13px; }

.note-item {

.note-time { font-size: 11px; color: #8A998A; margin-bottom: 4px; }

  position: relative; overflow: hidden;

.mini-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; }

  text-align: center; color: #6B7A6B;
  margin-bottom: 16px; cursor: pointer;

.photo-preview {
  width: 100%; max-height: 240px;

  margin-bottom: 12px;

.analysis-result {
  background: #FFFCF7; border-radius: 14px;
  padding: 14px; margin-bottom: 12px;
  border: 1px solid rgba(74, 103, 65, 0.1);

.food-item {
  background: #FFFCF7; border-radius: 12px;
  padding: 12px; margin-bottom: 8px;

.food-meta { font-size: 12px; color: #6B7A6B; margin-top: 2px; }
.food-actions { display: flex; gap: 6px; }

  width: 20px; height: 20px;

  display: inline-block;

@keyframes spin { to { transform: rotate(360deg); } }

.chart-container {
  width: 100%; height: 200px;

.chart-svg { width: 100%; height: 100%; }

.chart-line { fill: none; stroke: #4A6741; stroke-width: 2; }

.chart-grid { stroke: #EDE4D3; stroke-dasharray: 3 3; }

.install-prompt {

// ============ 儲存（localStorage）============
const store = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { console.error(e); } },
  del: (k) => localStorage.removeItem(k),
  keys: (prefix) => Object.keys(localStorage).filter(k => k.startsWith(prefix)),
};

// ============ 建議值計算 ============
function calcSuggestion(bmr, activityFactor, goalType) {
  const tdee = bmr * activityFactor;
  const targets = {
    "cut-fast": tdee - 500, "cut-mid": tdee - 350, "cut-slow": tdee - 200,
    "maintain": tdee,
    "gain-slow": tdee + 200, "gain-mid": tdee + 350, "gain-fast": tdee + 500,
  };
  const cal = targets[goalType] || tdee;
  let proteinRatio = 0.20;
  if (goalType.startsWith("cut")) proteinRatio = 0.30;
  else if (goalType.startsWith("gain")) proteinRatio = 0.25;
  const proteinKcal = cal * proteinRatio;
  const proteinServings = Math.round(proteinKcal / 75);
  const vegKcal = 5 * 25;
  const fruitKcal = 1.5 * 60;
  const dairyKcal = 1.5 * 120;
  const fatRatio = 0.25;
  const fatKcal = cal * fatRatio;
  const fatServings = Math.round(fatKcal / 45);
  const stapleKcal = Math.max(cal - proteinKcal - vegKcal - fruitKcal - dairyKcal - fatKcal, cal * 0.3);
  const stapleServings = Math.round(stapleKcal / 70);
  return {
    protein: { min: Math.max(proteinServings - 1, 3), max: proteinServings + 1, enabled: true },
    staple: { min: Math.max(stapleServings - 1, 3), max: stapleServings + 1, enabled: true },
    veg: { min: 4, max: 6, enabled: true },
    fruit: { min: 1, max: 2, enabled: true },
    dairy: { min: 1, max: 2, enabled: true },
    fat: { min: Math.max(fatServings - 1, 2), max: fatServings + 1, enabled: false },
    water: { min: 2000, max: 2500, enabled: true },
    other: { min: 0, max: 0, enabled: true },
    _meta: { tdee: Math.round(tdee), targetCal: Math.round(cal), goalType }
  };
}

// ============ 渲染輔助 ============
function h(tag, attrs = {}, children = []) {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === "class") el.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html") el.innerHTML = v;
    else if (v !== null && v !== undefined && v !== false) el.setAttribute(k, v);
  });
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(String(c)) : c);
  });
  return el;
}

  const app = document.getElementById("app");
  app.innerHTML = "";

  // 頂部 header
  const header = h("header", { class: "header" }, [
    h("h1", {}, "飲控筆記"),
    h("div", { class: "date" }, (state.currentDate === todayKey() ? "今天 · " : "") + state.currentDate),
  ]);
  app.appendChild(header);

  // 安裝提示
  if (state.showInstall) {
    app.appendChild(renderInstallPrompt());
  }

  const content = h("main", { class: "content" });
  if (state.tab === "today") renderToday(content);
  else if (state.tab === "log") renderLog(content);
  else if (state.tab === "history") renderHistory(content);
  else if (state.tab === "foods") renderFoods(content);
  else if (state.tab === "settings") renderSettings(content);
  app.appendChild(content);

  app.appendChild(renderNav());

  if (state.modal) {
    app.appendChild(state.modal());
  }
}

function renderInstallPrompt() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

    ? "點下方分享 → 加入主畫面，把這個 app 釘到桌面"
    : "可以加入主畫面，方便快速開啟";
  return h("div", { class: "install-prompt" }, [
    h("span", {}, "📱 " + text),
    h("button", {
      onclick: () => {
        localStorage.setItem("installDismissed", "1");
        state.showInstall = false;
        render();
      }
    }, "知道了")
  ]);
}

function renderNav() {

// ============ 今日視圖 ============
function renderToday(parent) {
  if (state.currentDate !== todayKey()) {
    parent.appendChild(h("button", {
      class: "secondary-btn",
      style: { marginBottom: "12px", display: "flex", alignItems: "center", gap: "4px" },
      onclick: () => { loadDay(todayKey()); render(); }
    }, "← 回到今天"));
  }

  ELEMENTS.filter(e => state.goals[e.key]?.enabled !== false).forEach(el => {
    const goal = state.goals[el.key] || { min: 0, max: 0 };
    const current = state.data.servings[el.key] || 0;
    const status = current < goal.min ? "under" : current > goal.max ? "over" : "ok";
    const isW = el.isWater;
    const fmt = (n) => isW ? Math.round(n) : (Math.round(n * 10) / 10);
    const statusText = status === "under" ? `還差 ${fmt(goal.min - current)}` :
      status === "over" ? `超過 ${fmt(current - goal.max)}` : "已達標";
    const pct = goal.max > 0 ? Math.min((current / goal.max) * 100, 110) : 0;
    const minPct = goal.max > 0 ? (goal.min / goal.max) * 100 : 0;

    const adjust = (delta) => {
      const cur = state.data.servings[el.key] || 0;
      state.data.servings[el.key] = isW
        ? Math.max(0, Math.round(cur + delta))
        : Math.max(0, +(cur + delta).toFixed(1));
      saveDay(); render();
    };

    const setVal = (val) => {
      const p = parseFloat(val) || 0;
      state.data.servings[el.key] = isW ? Math.max(0, Math.round(p)) : Math.max(0, p);
      saveDay(); render();
    };

    const card = h("div", { class: "ring-card" }, [
      h("div", { class: "ring-row" }, [
        h("div", { style: { fontSize: "28px" } }, el.emoji),
        h("div", { class: "ring-info" }, [
          h("div", { class: "ring-label" }, [
            h("div", {}, [
              h("span", { class: "ring-name" }, el.label),
              h("span", { class: `status-pill status-${status}` }, statusText),
            ]),
            h("div", { class: "ring-value" }, [
              h("strong", {}, String(fmt(current))),
              " " + (el.unit || "份") + " / " + (goal.min === goal.max ? goal.min : `${goal.min}-${goal.max}`)
            ]),
          ]),
          h("div", { class: "progress-bar" }, [
            h("div", {
              class: "progress-fill",
              style: { width: Math.min(pct, 100) + "%", background: status === "over" ? "#B04F4F" : el.color }
            }),
            minPct > 0 && minPct < 100 ? h("div", { class: "progress-marker", style: { left: minPct + "%" } }) : null
          ]),
        ]),
      ]),
      h("div", { class: "quick-btns" },
        isW ? [
          h("button", { class: "qbtn", onclick: () => adjust(250) }, "+ 250"),
          h("button", { class: "qbtn", onclick: () => adjust(500) }, "+ 500"),
          h("button", { class: "qbtn", onclick: () => adjust(-250) }, "− 250"),
          h("input", {
            class: "num-input", type: "number", step: "50",
            value: fmt(current),
            style: { flex: "1.5" },
            oninput: (e) => setVal(e.target.value),
          })
        ] : [
          h("button", { class: "qbtn", onclick: () => adjust(-0.5) }, "− 0.5"),
          h("button", { class: "qbtn", onclick: () => adjust(1) }, "+ 1"),
          h("input", {
            class: "num-input", type: "number", step: "0.1",
            value: fmt(current),
            style: { flex: "1.5" },
            oninput: (e) => setVal(e.target.value),
          })
        ]
      )
    ]);
    parent.appendChild(card);
  });

  parent.appendChild(h("div", { class: "section-title", style: { marginTop: "24px" } }, "📷 快速新增"));

  parent.appendChild(h("div", {
    class: "action-card",
    onclick: () => openPhotoModal()
  }, [
    h("div", { style: { display: "flex", alignItems: "center", gap: "12px" } }, [
      h("div", { style: { fontSize: "20px" } }, "📷"),
      h("div", {}, [
        h("div", { style: { fontWeight: "500" } }, "拍照分析"),
        h("div", { style: { fontSize: "12px", color: "#6B7A6B" } },
          state.apiKey ? "AI 估算份量" : "需先到設定填 API 金鑰"),
      ])
    ]),
    h("span", { style: { color: "#8A998A" } }, "›")
  ]));

  parent.appendChild(h("div", {
    class: "action-card",
    onclick: () => openFoodPicker()
  }, [
    h("div", { style: { display: "flex", alignItems: "center", gap: "12px" } }, [
      h("div", { style: { fontSize: "20px" } }, "🗂"),
      h("div", {}, [
        h("div", { style: { fontWeight: "500" } }, "從食物庫加入"),
        h("div", { style: { fontSize: "12px", color: "#6B7A6B" } }, `${state.foods.length} 樣食物`),

  days.sort((a, b) => b.key.localeCompare(a.key));

  if (days.length === 0) {
    parent.appendChild(h("div", { class: "empty-state" }, "還沒有歷史記錄"));

  // 體重曲線
  const weightData = days
    .filter(d => d.data.weight != null)

    .sort((a, b) => a.key.localeCompare(b.key));

  if (weightData.length >= 2) {
    parent.appendChild(h("div", { class: "section-title" }, "📈 體重趨勢"));

    const first = weightData[0].weight;

    const diff = last - first;

    card.appendChild(h("div", {
      style: { display: "flex", justifyContent: "space-between", padding: "8px 12px 0", fontSize: "12px", color: "#6B7A6B" }
    }, [
      h("span", {}, `共 ${weightData.length} 筆`),
      h("span", {}, [
        `${first} → `,
        h("strong", {}, `${last} kg`),
        h("span", { style: { color: diffColor, marginLeft: "6px" } }, `(${sign}${diff.toFixed(1)})`)
      ])
    ]));
    parent.appendChild(card);
  }

  const visibleEls = ELEMENTS.filter(e => state.goals[e.key]?.enabled !== false);

  parent.appendChild(h("div", { class: "section-title" }, "最近紀錄"));

  days.forEach(({ key, data }) => {
    const bars = h("div", { class: "mini-bars" });
    visibleEls.forEach(el => {
      const goal = state.goals[el.key] || { min: 1, max: 1 };
      const cur = data.servings?.[el.key] || 0;
      const pct = goal.max > 0 ? Math.min((cur / goal.max) * 100, 100) : 0;
      const ok = cur >= goal.min && cur <= goal.max;

      bars.appendChild(h("div", { class: "mini-bar", title: el.label }, [
        h("div", {
          class: "mini-bar-fill",

      ]),
      bars
    ]));
  });
}

// ============ SVG 體重曲線 ============
function renderWeightChart(data) {
  const W = 440, H = 200, padL = 36, padR = 12, padT = 16, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const weights = data.map(d => d.weight);
  const minW = Math.min(...weights);
  const maxW = Math.max(...weights);
  const range = Math.max(maxW - minW, 1);
  const yMin = minW - range * 0.15;
  const yMax = maxW + range * 0.15;
  const yRange = yMax - yMin;

  const xStep = data.length > 1 ? plotW / (data.length - 1) : plotW;
  const points = data.map((d, i) => ({
    x: padL + i * xStep,
    y: padT + plotH - ((d.weight - yMin) / yRange) * plotH,
    label: formatDate(d.key),
    weight: d.weight,
  }));

  const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p.x + "," + p.y).join(" ");

  // Y 軸刻度（3 條）
  const yTicks = [yMin, (yMin + yMax) / 2, yMax];

  // X 軸標籤（最多 5 個）
  const labelStep = Math.max(1, Math.ceil(data.length / 5));
  const xLabels = points.filter((_, i) => i % labelStep === 0 || i === points.length - 1);

  const container = h("div", { class: "chart-container" });
  container.innerHTML = `
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      ${yTicks.map(t => {
        const y = padT + plotH - ((t - yMin) / yRange) * plotH;
        return `<line class="chart-grid" x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}"/>
                <text class="chart-axis" x="${padL - 6}" y="${y + 3}" text-anchor="end">${t.toFixed(1)}</text>`;
      }).join("")}
      ${xLabels.map(p => `<text class="chart-axis" x="${p.x}" y="${H - 6}" text-anchor="middle">${p.label}</text>`).join("")}
      <path class="chart-line" d="${pathD}"/>
      ${points.map(p => `<circle class="chart-dot" cx="${p.x}" cy="${p.y}" r="3.5"><title>${p.label}: ${p.weight} kg</title></circle>`).join("")}
    </svg>
  `;
  return container;
}

    h("div", { class: "form-label" }, "Anthropic API 金鑰"),
    h("input", {
      class: "form-input", type: "password",
      placeholder: "sk-ant-...", value: state.apiKey,

      oninput: (e) => {

        store.set("apiKey", state.apiKey);
      }
    }),
    h("div", { style: { fontSize: "11px", color: "#8A998A", lineHeight: "1.5" } },
      "拍照分析會呼叫 Claude API。金鑰只存在本機，不會傳送到其他地方。可至 console.anthropic.com 取得。沒填也能正常使用其他功能。"
    )
  ]));

  // 資料管理
  parent.appendChild(h("div", { class: "section-title", style: { marginTop: "24px" } }, "💾 資料管理"));
  parent.appendChild(h("button", {
    class: "secondary-btn",
    style: { marginBottom: "8px", width: "100%" },
    onclick: () => {
      const data = {};
      Object.keys(localStorage).forEach(k => { data[k] = localStorage.getItem(k); });
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `diet-backup-${todayKey()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
  }, "匯出所有資料"));

  const importInput = h("input", {
    type: "file", accept: "application/json",
    style: { display: "none" },
    onchange: (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (confirm("匯入會覆蓋目前資料，確定？")) {
            Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
            location.reload();
          }
        } catch { alert("檔案格式錯誤"); }
      };
      reader.readAsText(file);
    }
  });
  parent.appendChild(importInput);
  parent.appendChild(h("button", {
    class: "secondary-btn",
    style: { width: "100%" },
    onclick: () => importInput.click()
  }, "匯入備份"));
}

function openModal(fn) { state.modal = fn; render(); }
function closeModal() { state.modal = null; render(); }

function openFoodEdit(food) {
  let name = food.name || "", amount = food.amount || "", contribs = { ...(food.contributions || {}) };
  openModal(() => {
    const overlay = h("div", { class: "modal-overlay", onclick: closeModal });
    const modal = h("div", { class: "modal", onclick: (e) => e.stopPropagation() }, [
      h("div", { class: "modal-header" }, [
        h("div", { class: "modal-title" }, food.id ? "編輯食物" : "新增食物"),
        h("button", { class: "icon-btn", onclick: closeModal }, "✕")
      ]),
      h("div", { class: "form-group" }, [
        h("div", { class: "form-label" }, "名稱"),
        h("input", { class: "form-input", value: name, oninput: (e) => { name = e.target.value; }, placeholder: "例：雞胸肉便當" })
      ]),
      h("div", { class: "form-group" }, [
        h("div", { class: "form-label" }, "份量描述"),
        h("input", { class: "form-input", value: amount, oninput: (e) => { amount = e.target.value; }, placeholder: "例：一個便當、半碗" })
      ]),
      h("div", { class: "form-label", style: { marginBottom: "10px" } }, "包含份量"),
      ...ELEMENTS.map(el => h("div", { class: "form-group", style: { display: "flex", alignItems: "center", gap: "10px" } }, [
        h("div", { style: { width: "80px", fontSize: "14px" } }, `${el.emoji} ${el.label}`),
        h("input", {
          class: "form-input", type: "number",
          step: el.isWater ? "50" : "0.1",
          value: contribs[el.key] || "", placeholder: "0",
          oninput: (e) => { contribs[el.key] = parseFloat(e.target.value) || 0; }
        })
      ])),
      h("button", {
        class: "primary-btn", style: { marginTop: "16px" },
        onclick: () => {
          if (!name.trim()) return;
          const newFood = { name: name.trim(), amount, contributions: contribs, id: food.id || Date.now().toString() };
          if (food.id) state.foods = state.foods.map(f => f.id === food.id ? newFood : f);
          else state.foods = [...state.foods, newFood];
          store.set("foods", state.foods);
          closeModal();
        }
      }, "✓ 儲存")
    ]);
    overlay.appendChild(modal);
    return overlay;
  });
}

function openFoodPicker() {
  let search = "", picked = null, mult = 1;
  openModal(() => {
    const overlay = h("div", { class: "modal-overlay", onclick: closeModal });

    if (picked) {
      const modal = h("div", { class: "modal", onclick: (e) => e.stopPropagation() }, [
        h("div", { class: "modal-header" }, [
          h("div", { class: "modal-title" }, picked.name),
          h("button", { class: "icon-btn", onclick: () => { picked = null; render(); } }, "✕")
        ]),
        h("div", { class: "form-group" }, [
          h("div", { class: "form-label" }, "份數倍率"),
          h("div", { style: { display: "flex", gap: "8px", alignItems: "center" } }, [
            h("button", { class: "qbtn", style: { flex: "0 0 50px" }, onclick: () => { mult = Math.max(0.5, mult - 0.5); render(); } }, "−"),
            h("input", { class: "num-input", type: "number", step: "0.5", value: mult, oninput: (e) => { mult = parseFloat(e.target.value) || 1; } }),
            h("button", { class: "qbtn", style: { flex: "0 0 50px" }, onclick: () => { mult += 0.5; render(); } }, "+")
          ])
        ]),
        h("div", { class: "analysis-result" }, [
          h("div", { class: "form-label" }, "將會新增"),
          ...Object.entries(picked.contributions || {}).filter(([, v]) => v > 0).map(([k, v]) => {
            const el = ELEMENTS.find(e => e.key === k);
            return h("div", {}, `${el?.emoji} ${el?.label}：+${(v * mult).toFixed(1)} ${el?.unit || "份"}`);
          })
        ]),
        h("button", {
          class: "primary-btn",
          onclick: () => {
            Object.entries(picked.contributions || {}).forEach(([k, v]) => {
              const isW = k === "water";
              const cur = state.data.servings[k] || 0;
              state.data.servings[k] = isW
                ? Math.round(cur + v * mult)
                : +(cur + v * mult).toFixed(1);
            });
            state.data.notes = state.data.notes || [];
            state.data.notes.push({ time: nowTime(), text: `${picked.name} × ${mult}` });
            saveDay();
            closeModal();
          }
        }, "✓ 加入今日")
      ]);
      overlay.appendChild(modal);
      return overlay;
    }

    const list = h("div");
    const renderList = () => {
      list.innerHTML = "";

      if (filtered.length === 0) {
        list.appendChild(h("div", { class: "empty-state" }, "沒有相符的食物"));

      }
      filtered.forEach(food => {
        const contribs = Object.entries(food.contributions || {}).filter(([, v]) => v > 0);
        list.appendChild(h("div", {
          class: "food-item",
          style: { cursor: "pointer" },
          onclick: () => { picked = food; render(); }
        }, [
          h("div", { class: "food-info" }, [
            h("div", { class: "food-name" }, [
              food.name,
              food.isEstimate ? h("span", {
                style: {
                  fontSize: "10px", marginLeft: "6px", padding: "1px 6px",
                  borderRadius: "6px", background: "#F5E5D5", color: "#B07A3F"
                }
              }, "估算") : null
            ]),
            h("div", { class: "food-meta" },
              (food.amount ? food.amount + " · " : "") +
              contribs.map(([k, v]) => {
                const el = ELEMENTS.find(e => e.key === k);
                return el ? `${el.emoji}${v}` : "";
              }).join(" ")
            )
          ]),
          h("span", { style: { color: "#8A998A" } }, "›")
        ]));
      });
    };
    renderList();

    const modal = h("div", { class: "modal", onclick: (e) => e.stopPropagation() }, [
      h("div", { class: "modal-header" }, [
        h("div", { class: "modal-title" }, "選擇食物"),
        h("button", { class: "icon-btn", onclick: closeModal }, "✕")
      ]),
      h("input", {
        class: "form-input",
        placeholder: "搜尋...",
        style: { marginBottom: "12px" },
        oninput: (e) => { search = e.target.value; renderList(); }
      }),
      list
    ]);
    overlay.appendChild(modal);
    return overlay;
  });
}

function openPhotoModal() {
  if (!state.apiKey) {
    alert("請先到「設定」頁填入 Anthropic API 金鑰");
    state.tab = "settings"; render();
    return;
  }

  let imageData = null, imageMime = null, analyzing = false, result = null, error = null;

  const fileInput = h("input", {
    type: "file", accept: "image/*", capture: "environment",
    style: { display: "none" }
  });

  fileInput.onchange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    imageMime = file.type;
    const reader = new FileReader();
    reader.onload = () => { imageData = reader.result; result = null; error = null; render(); };
    reader.readAsDataURL(file);
  };

  const analyze = async () => {
    if (!imageData) return;
    analyzing = true; error = null; render();
    try {
      const base64 = imageData.split(",")[1];
      const prompt = `這是一張食物照片，請以台灣營養份量單位估算各類份量。

份量定義：
- 蛋白質1份 ≈ 7g 蛋白質（約 1 顆蛋、35g 熟肉、半盒豆腐）
- 主食1份 ≈ 15g 醣（約 1/4 碗白飯、半碗麵、半個饅頭）
- 蔬菜1份 ≈ 100g 生重（約半碗熟青菜）
- 奶製品1份 ≈ 240ml 牛奶或同等
- 油脂1份 ≈ 5g 油（約 1 茶匙油、1/3 湯匙堅果）

請回傳 JSON（不要 markdown 不要其他文字）：
{
  "description": "食物描述（中文，簡短，30字內）",
  "contributions": {
    "protein": 數字, "staple": 數字, "veg": 數字,
    "dairy": 數字, "fat": 數字, "water": 0, "other": 0
  },
  "confidence": "高/中/低",
  "note": "可能需要注意的部分（中文，可選）"
}`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": state.apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: imageMime, data: base64 } },
              { type: "text", text: prompt }
            ]
          }]
        })
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const text = data.content.map(i => i.text || "").filter(Boolean).join("\n");
      const clean = text.replace(/```json|```/g, "").trim();
      result = JSON.parse(clean);
    } catch (e) {
      console.error(e);
      error = "分析失敗：" + e.message + "。可以直接手動加入份量。";
    } finally {
      analyzing = false;
      render();
    }
  };

  openModal(() => {
    const overlay = h("div", { class: "modal-overlay", onclick: closeModal });
    const children = [
      h("div", { class: "modal-header" }, [
        h("div", { class: "modal-title" }, "拍照分析"),
        h("button", { class: "icon-btn", onclick: closeModal }, "✕")
      ]),
      fileInput,
    ];

    if (!imageData) {
      children.push(h("div", { class: "photo-area", onclick: () => fileInput.click() }, [
        h("div", { style: { fontSize: "32px", marginBottom: "8px" } }, "📷"),
        h("div", {}, "點此拍照或選照片")
      ]));
    }

    if (imageData) {
      children.push(h("img", { src: imageData, class: "photo-preview" }));
      children.push(h("div", { style: { display: "flex", gap: "8px", marginBottom: "12px" } }, [
        h("button", { class: "secondary-btn", style: { flex: "1" }, onclick: () => fileInput.click() }, "換張照片"),
        !result ? h("button", {
          class: "primary-btn", style: { flex: "2" },
          onclick: analyze, disabled: analyzing
        }, analyzing ? "分析中..." : "開始分析") : null
      ].filter(Boolean)));
    }

    if (error) {
      children.push(h("div", { class: "analysis-result", style: { background: "#F5D5D5", color: "#B04F4F" } }, error));
    }

    if (result) {
      children.push(h("div", { class: "analysis-result" }, [
        h("div", { style: { fontWeight: "500", marginBottom: "4px" } }, result.description),
        h("div", { style: { fontSize: "12px", color: "#6B7A6B" } }, `信心度：${result.confidence}`),
        result.note ? h("div", { style: { fontSize: "12px", color: "#6B7A6B", marginTop: "4px" } }, `※ ${result.note}`) : null
      ]));
      children.push(h("div", { class: "form-label", style: { marginBottom: "10px" } }, "估算份量（可調整）"));
      ELEMENTS.filter(el => el.key !== "water" && el.key !== "other").forEach(el => {
        children.push(h("div", { class: "form-group", style: { display: "flex", alignItems: "center", gap: "10px" } }, [
          h("div", { style: { width: "80px", fontSize: "14px" } }, `${el.emoji} ${el.label}`),
          h("input", {
            class: "form-input", type: "number", step: "0.1",
            value: result.contributions[el.key] || 0,
            oninput: (e) => { result.contributions[el.key] = parseFloat(e.target.value) || 0; }
          })
        ]));
      });
      children.push(h("button", {
        class: "primary-btn", style: { marginTop: "12px" },
        onclick: () => {
          Object.entries(result.contributions).forEach(([k, v]) => {
            const isW = k === "water";
            const cur = state.data.servings[k] || 0;
            state.data.servings[k] = isW ? Math.round(cur + v) : +(cur + v).toFixed(1);
          });
          state.data.notes = state.data.notes || [];
          state.data.notes.push({ time: nowTime(), text: result.description || "拍照記錄" });
          saveDay();
          closeModal();
        }
      }, "✓ 加入今日"));
    }

    const modal = h("div", { class: "modal", onclick: (e) => e.stopPropagation() }, children);
    overlay.appendChild(modal);
    return overlay;
  });
}

        }, "套用建議值")
      ]));
      children.push(h("div", {
        style: { fontSize: "11px", color: "#8A998A", marginTop: "10px", textAlign: "center" }
      }, "套用後可繼續手動微調"));
    }

    const modal = h("div", { class: "modal", onclick: (e) => e.stopPropagation() }, children);
    overlay.appendChild(modal);
    return overlay;
  });
}

// ============ 啟動 ============
render();

// PWA Service Worker（離線可用）
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'diet-v1';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.open(CACHE).then(cache =>
          cache.match(e.request).then(cached => {
            const fetchPromise = fetch(e.request).then(res => {
              if (res.ok && e.request.url.startsWith(self.location.origin)) {
                cache.put(e.request, res.clone());
              }
              return res;
            }).catch(() => cached);
            return cached || fetchPromise;
          })
        )
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(e => console.log('SW registration failed:', e));
}
</script>
